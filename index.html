      <section class="sponsors-strip" aria-label="Sponsors">
        <div class="sponsors-row sponsors-row-top organized-by-wrapper">

      <div class="grain" aria-hidden="true"></div>
      <div class="crt-overlay" aria-hidden="true"></div>

      <div class="audio-player-wrapper">
        <button class="audio-toggle-btn" aria-label="Open audio player">
          <svg class="audio-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="none"></polygon>
            <path class="audio-icon-wave" d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            <path class="audio-icon-wave" d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          </svg>
        </button>
        <div class="audio-mini-player">
          <button class="audio-play-btn" aria-label="Play/Pause">
            <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
              <rect x="6" y="4" width="4" height="16"></rect>
              <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
          </button>
          <div class="audio-progress-container">
            <div class="audio-progress-bar">
              <div class="audio-progress-fill"></div>
            </div>
          </div>
          <div class="audio-volume-container">
            <span class="audio-volume-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="none"></polygon>
                <path class="volume-wave" d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                <path class="volume-wave" d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
              </svg>
            </span>
            <input type="range" class="audio-volume-slider" min="0" max="100" value="50" aria-label="Volume" />
            <button class="audio-mute-btn" aria-label="Mute/Unmute">
              <svg class="mute-icon-unmuted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="none"></polygon>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
              </svg>
              <svg class="mute-icon-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="none"></polygon>
                <line x1="23" y1="9" x2="17" y2="15"></line>
                <line x1="17" y1="9" x2="23" y2="15"></line>
              </svg>
            </button>
          </div>
        </div>
